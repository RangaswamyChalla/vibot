name: VoiceBot AXIOM CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f voice-bot/requirements.txt ]; then pip install -r voice-bot/requirements.txt; fi

    - name: Run syntax and formatting lint
      run: |
        pip install flake8
        flake8 voice-bot/src/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Integration PyTest
      run: |
        pip install pytest pytest-asyncio
        if [ -d "voice-bot/src/tests" ]; then pytest voice-bot/src/tests/; fi
