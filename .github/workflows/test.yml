name: Python Integration Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-mock httpx websockets
        # Install app requirements (skipping heavy models for CI if possible)
        pip install requests pydub SpeechRecognition python-dotenv python-multipart aiofiles fastapi uvicorn
        
    - name: Run Integration Tests
      run: |
        pytest -v voice-bot/src/tests/integration/
